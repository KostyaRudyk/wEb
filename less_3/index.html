<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table,
        td{
            text-align: center;
            border-width: 1000px;
            padding: 30px;
            border: 1px solid black;
        }
        table{
            border-collapse: collapse;
            border-bottom: dashed;
            border-bottom-color: #ff0000;
            border-top: dashed;
            border-top-color: #ff0000;
            width: 70%;
        }
    </style>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <tr style="background: #ff6868;">
        <td >1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
    </tr>
    <tr>
        <td style="background: #ff6868;">5</td>
        <td rowspan="2" style="background:#486aff;">6</td>
        <td style="background: #ff6868;">7</td>
        <td style="background: #ff6868;">8</td>
    </tr>
    <tr>
        <td style="background: #ff6868;">9</td>
        <td style="background: #ff6868;">11</td>
        <td style="background:#ff6868;">12</td>
    </tr>
    <tr>
        <td style="background:#ff6868;">13</td>
        <td style="background: red;">14</td>
        <td style="background:#ff6868;">15</td>
        <td style="background:#ff6868;">16</td>
    </tr>
    <tr>
        <td style="background:#ff6868;">17</td>
        <td style="background: red;">18</td>
        <td style="background:#ff6868;">19</td>
        <td style="background:#ff6868;">20</td>
    </tr>
    <tr>
        <td style="background:#ff6868;">21</td>
        <td style="background: red;">22</td>
        <td style="background:#ff6868;">23</td>
        <td style="background:#ff6868;">24</td>
    </tr>
    <tr>
        <td style="background:#ff6868;">25</td>
        <td colspan = '3' style="background:#76ff76;">26</td>
    </tr>
    <tr>
        <td style="background:#ff6868;">29</td>
        <td style="background:#486aff;">30</td>
        <td style="background:#486aff;">31</td>
        <td style="background:#486aff;">32</td>
    </tr>
</table>
</body>
</html>
